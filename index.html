<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(#ffb6d5,#ffcce6);
    text-align:center;
    color:#ff1493;
}

h1{
    margin-top:40px;
}

.envelope{
    width:250px;
    height:150px;
    background:#ff69b4;
    margin:80px auto;
    border-radius:10px;
    cursor:pointer;
}

.paper{
    display:none;
    background:white;
    width:300px;
    margin:20px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.paper img{
    width:200px;
    border-radius:10px;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#ff69b4;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

.cinematic{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    justify-content:center;
    align-items:center;
    font-size:24px;
}
</style>
</head>

<body>

<h1>💗 For Someone Special 💗</h1>

<div class="envelope" onclick="openLetter()">
    💌 Tap To Open
</div>

<div class="paper" id="letter">
    <h2>I'm Sorry</h2>
    <p>
    I never meant to hurt you.<br>
    You mean everything to me.<br>
    Please forgive me. 💖
    </p>

    <img src="foto1.jpg">

    <br>
    <button onclick="finish()">Finish</button>
</div>

<div class="cinematic" id="cinematic">
    The program is finished,<br>
    but my love for you never ends. 💞
</div>

<script>
function openLetter(){
    document.getElementById("letter").style.display="block";
}

function finish(){
    document.getElementById("cinematic").style.display="flex";
}
</script>

</body>
</html>
